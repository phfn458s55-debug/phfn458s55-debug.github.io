<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Una sorpresa per te ❤️</title>

<style>

body {
    background: #fff0f5;
    font-family: Georgia, serif;
    text-align: center;
    padding: 40px 20px;
}


h1 {
    color: #ff5d8f;
}


.busta {
    width: 280px;
    height: 180px;
    background: white;
    margin: 50px auto 20px;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    border: 2px solid #f5dce2;
    overflow: hidden;
}


/* triangolo che simula la chiusura della busta */
.busta:before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-top: 90px solid #ffe5ec;
}


/* cuore al centro */
.busta:after {
    content: "❤️";
    position: absolute;
    font-size: 55px;
    left: 50%;
    top: 55%;
    transform: translate(-50%, -50%);

}


.aperta {
    transform: rotateX(180deg);
}


.lettera {
    display: none;
    background: white;
    max-width: 600px;
    margin: 30px auto;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    font-size: 20px;
    line-height: 1.6;
}


.mostra {
    display: block;
}


#messaggio {
    color: #ff5d8f;
    font-size: 20px;
}

</style>

</head>


<body>


<h1>acopri il primo regalino...</h1>

<p>
Questa busta contiene un piccolo pezzo del mio cuore...
</p>

<p id="messaggio">
💌 Tocca la busta 3 volte per aprirla
</p>


<div class="busta" onclick="apri()"></div>


<div class="lettera" id="lettera">

<h2>Per te 🎁</h2>

<p>
Qui scriverai la tua lettera...
<br><br>
Amore mio, 
<br><br>
[Inserisci qui il tuo messaggio personale]
<br><br>
Ti voglio bene 🩷
</p>

</div>


<script>

let tocchi = 0;


function apri(){

tocchi++;


if(tocchi == 1){

document.getElementById("messaggio").innerHTML =
"✨ Ancora due tocchi...";

}


if(tocchi == 2){

document.getElementById("messaggio").innerHTML =
"✨ Ci siamo quasi...";

}


if(tocchi == 3){

document.querySelector(".busta").classList.add("aperta");


setTimeout(function(){

document.querySelector(".busta").style.display="none";

document.getElementById("messaggio").style.display="none";

document.getElementById("lettera").classList.add("mostra");

},1000);


}

}

</script>


</body>
</html>
